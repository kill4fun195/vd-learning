services:
  api:
    build: .
    container_name: learning-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - docker-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  docker-dev:
    external: true
    name: docker-dev_default
